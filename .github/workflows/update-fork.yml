name: Update Fork

on:
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Merge every 6 hours
    - cron: '14 */6 * * *'

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest

    if: ${{ github.repository_owner == 'limwa' }}

    strategy:
      fail-fast: false
      matrix:
        branch:
          - master

    steps:
      - name: Sync ${{ matrix.branch }}
        run: gh repo sync ${{ github.repository }} -b ${{ matrix.branch }}
        env:
          GH_TOKEN: ${{ secrets.UPDATE_FORK_PAT }}

  rebase:
    name: Rebase
    runs-on: ubuntu-latest
    needs: [sync]

    if: ${{ github.repository_owner == 'limwa' }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        config:
          - from: master
            to: limwa-gh

          - from: master
            to: dotfiles

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.config.to }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch target branch
        run: |
          git fetch --depth=1 origin +${{ matrix.config.from }}:${{ matrix.config.from }}
          git repack -ad

      - name: If no merge base, deepen source branch
        run: |
          if ! git merge-base --is-ancestor ${{ matrix.config.to }} ${{ matrix.config.from }}; then
            git fetch --shallow-exclude=${{ matrix.config.from }} origin ${{ matrix.config.to }} || true
            git repack -ad

            git fetch --deepen=1 origin ${{ matrix.config.to }}
            git repack -ad
          fi

      - name: If no merge base, deepen target branch
        run: |
          if ! git merge-base --is-ancestor ${{ matrix.config.from }} ${{ matrix.config.to }}; then
            git fetch --shallow-exclude=${{ matrix.config.to }} origin ${{ matrix.config.from }} || true
            git repack -ad

            git fetch --deepen=1 origin ${{ matrix.config.from }}
            git repack -ad
          fi

      - name: Rebase
        run: git rebase ${{ matrix.config.from }}

      - name: Push
        run: git push --force-with-lease origin ${{ matrix.config.to }}
        env:
          GH_TOKEN: ${{ github.token }}